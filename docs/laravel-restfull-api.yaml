            type: object
        "404":
          $ref: "#/responses/NotFound"
        "422":
          $ref: "#/responses/ValidationError"
      description: Forgot password Link Send
      operationId: forgotPasswordLinkSend
      summary: Forgot password Link Send
      tags:
        - Auth
  /api/auth/login:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            properties:
              id_user:
                example: johndoe123
                type: string
              password:
                example: "12345678"
                type: string
            type: object
      responses:
        "200":
          description: Success login
          schema:
            properties:
              data:
                properties:
                  email:
                    example: john_doe@mail.com
                    type: string
                  id:
                    example: 9d3c62d8-f9a7-4f57-99a2-ee3f480b3be4
                    type: string
                  name:
                    example: John doe
                    type: string
                  profile_photo_path:
                    example: http://127.0.0.1:8000/assets/img/profile/user.png
                    type: string
                  role:
                    example: user
                    type: string
                  username:
                    example: johndoe123
                    type: string
                type: object
