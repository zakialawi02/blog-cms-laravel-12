swagger: "2.0"
info:
  contact: {}
  title: laravel-restfull-api
  version: 1.0.0
host: 127.0.0.1:8000
basePath: /
schemes:
  - http
paths:
  /api/auth/email/verification-notification:
    post:
      produces:
        - application/json
      parameters: []
      responses:
        "200":
          description: Success sent email verif
          schema:
            properties:
              message:
                example: Verification link sent
                type: string
              success:
                example: true
                type: boolean
            type: object
        "401":
          $ref: "#/responses/Unauthorized"
      description: Verification notification send
      operationId: verificationNotificationSend
      summary: Verification notification send
      tags:
        - Auth
      security:
        - bearerAuth: []
  /api/auth/forgot-password:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            properties:
              email:
                example: john_doe@mail.com
                type: string
            required:
              - email
            type: object
      responses:
        "200":
          description: Success sent
          schema:
            properties:
              message:
                example: Password reset link sent successfully
                type: string
              success:
                example: true
                type: boolean
              url_reset:
                example: /api/auth/reset-password/?token=KVQyh3lKRUSfOUITkI0vilIBxiReTueesFhQjAVloFOJebOfQKBDb3uYU2i2&email=john_doe@mail.com
                type: string
            type: object
        "404":
          $ref: "#/responses/NotFound"
        "422":
          $ref: "#/responses/ValidationError"
      description: Forgot password Link Send
      operationId: forgotPasswordLinkSend
      summary: Forgot password Link Send
      tags:
        - Auth
  /api/auth/login:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            properties:
              id_user:
                example: johndoe123
                type: string
              password:
                example: "12345678"
                type: string
            required:
              - id_user
              - password
            type: object
      responses:
        "200":
          description: Success login
          schema:
            properties:
              data:
                properties:
                  email:
                    example: john_doe@mail.com
                    type: string
                  id:
                    example: 9d3c62d8-f9a7-4f57-99a2-ee3f480b3be4
                    type: string
                  name:
                    example: John doe
                    type: string
                  profile_photo_path:
                    example: http://127.0.0.1:8000/assets/img/profile/user.png
                    type: string
                  role:
                    example: user
                    type: string
                  username:
                    example: johndoe123
                    type: string
                type: object
              message:
                example: Logged in
                type: string
              success:
                example: true
                type: boolean
              token:
                example: 20|9GHYOrgv67bJtYU65sjqklk9NkQPjzWs5B2HKBlxaf8c02de
                type: string
              token_type:
                example: Bearer
                type: string
            type: object
        "401":
          $ref: "#/responses/Unauthorized"
        "422":
          $ref: "#/responses/ValidationError"
      description: Login
      operationId: login
      summary: Login
      tags:
        - Auth
  /api/auth/logout:
    post:
      produces:
        - application/json
      parameters: []
      responses:
        "200":
          description: Success logout
          schema:
            properties:
              message:
                example: Logged out
                type: string
              success:
                example: true
                type: boolean
            type: object
        "401":
          $ref: "#/responses/Unauthorized"
      description: Logout
      operationId: logout
      summary: Logout
      tags:
        - Auth
      security:
        - bearerAuth: []
  /api/auth/register:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            properties:
              email:
                example: john_doe@mail.com
                type: string
              name:
                example: John doe
                type: string
              password:
                example: "12345678"
                type: string
              password_confirmation:
                example: "12345678"
                type: string
              username:
                example: johndoe123
                type: string
            required:
              - name
              - username
              - email
              - password
              - password_confirmation
            type: object
      responses:
        "201":
          description: Success registered
          schema:
            properties:
              data:
                properties:
                  email:
                    example: john_doe@mail.com
                    type: string
                  id:
                    example: 9d3c5f39-6f66-43c4-b89f-6d9bbf2fcea9
                    type: string
                  name:
                    example: John doe
                    type: string
                  profile_photo_path:
                    example: http://127.0.0.1:8000
                    type: string
                  role:
                    example: null
                    x-nullable: true
                  username:
                    example: johndoe123
                    type: string
                type: object
