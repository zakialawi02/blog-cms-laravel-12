          $ref: "#/responses/ValidationError"
      description: Register
      operationId: register
      summary: Register
      tags:
        - Auth
  /api/auth/reset-password/:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            properties:
              email:
                example: john_doe@mail.com
                type: string
              password:
                example: "12345678910"
                type: string
              password_confirmation:
                example: "12345678910"
                type: string
              token:
                example: KVQyh3lKRUSfOUITkI0vilIBxiReTueesFhQjAVloFOJebOfQKBDb3uYU2i2
                type: string
            required:
              - email
              - password
              - password_confirmation
              - token
            type: object
      responses:
        "201":
          description: Success password reset
          schema:
            properties:
              message:
                example: Your password has been reset.
                type: string
              success:
                example: true
                type: boolean
            type: object
        "400":
          description: "Error: email invalid"
          schema:
            properties:
              message:
                example: We can't find a user with that email address.
                type: string
              success:
                example: false
                type: boolean
            type: object
        "422":
          $ref: "#/responses/ValidationError"
      description: Reset password
      operationId: resetPassword
      summary: Reset password
      tags:
        - Auth
  /api/auth/verify-email/{user_id}/{hash}:
    parameters:
      - description: required
        in: path
        name: user_id
        required: true
        type: string
      - description: required
        in: path
        name: hash
        required: true
        type: string
    get:
      produces:
        - application/json
      parameters:
        - description: "required (eg: 1742964780)"
          in: query
          name: expires
          type: string
        - in: query
          name: amp;signature
          type: string
      responses:
        "200":
          description: Success verify
          schema:
            properties:
              message:
                example: Email verified
                type: string
              success:
                example: true
                type: boolean
            type: object
        "400":
          description: "Error: email already verified"
          schema:
            properties:
              message:
                example: Email already verified
                type: string
              success:
                example: false
                type: boolean
            type: object
      description: "`/api/auth/verify-email/{user_id}/{hash}`"
      operationId: verifyAccount
      summary: Verify account
      tags:
        - Auth
  /api/auth/{provider}/login:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: Provider name (e.g. google, github)
          in: path
          name: provider
          required: true
          type: string
        - in: body
          name: body
          schema:
            properties:
              provider_token:
                example: ya29.a0AfB_byC...
                type: string
            required:
              - provider_token
            type: object
