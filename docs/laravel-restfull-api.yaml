  /api/auth/verify-email/{user_id}/{hash}:
    parameters:
      - description: required
        in: path
        name: user_id
        required: true
        type: string
      - description: required
        in: path
        name: hash
        required: true
        type: string
    get:
      produces:
        - application/json
      parameters:
        - description: "required (eg: 1742964780)"
          in: query
          name: expires
          type: string
        - in: query
          name: amp;signature
          type: string
      responses:
        "200":
          description: Success verify
          schema:
            properties:
              message:
                example: Email verified
                type: string
              success:
                example: true
                type: boolean
            type: object
        "400":
          description: "Error: email already verified"
