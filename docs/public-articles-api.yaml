swagger: "2.0"
info:
  contact: {}
  title: Public Articles API
  version: 1.0.0
host: 127.0.0.1:8000
basePath: /
schemes:
  - http
paths:
  /api/v1/articles:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: "Page number for pagination (Optional, default: 1)"
          in: query
          name: page
          required: false
          type: integer
          default: 1
        - description: "Pagination limit (Optional, default: 9)"
          in: query
          name: limit
          required: false
          type: integer
        - description: "Search keyword"
          in: query
          name: search
          required: false
          type: string
        - description: "Sort column (e.g., published_at, title, created_at)"
          in: query
          name: sort
          required: false
          type: string
          default: "published_at"
        - description: "Sort direction (asc, desc)"
          in: query
          name: direction
          required: false
          type: string
          default: "desc"
        - description: "Filter by featured status (true/false)"
          in: query
          name: is_featured
          required: false
          type: boolean
      responses:
        "200":
          description: "Success retrieve articles list"
          schema:
            properties:
              data:
                type: array
                items:
                  $ref: "#/definitions/Article"
              meta:
                $ref: "#/definitions/PaginationMeta"
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Articles retrieved successfully"
            type: object
        "500":
          description: "Server error"
      description: Get all public articles list
      operationId: getPublicArticles
      summary: Get all public articles list
      tags:
        - Public Articles
  /api/v1/articles/summary:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: "Page number for pagination (Optional, default: 1)"
          in: query
          name: page
          required: false
          type: integer
          default: 1
        - description: "Pagination limit (Optional, default: 9)"
          in: query
          name: limit
          required: false
          type: integer
        - description: "Search keyword"
          in: query
          name: search
          required: false
          type: string
        - description: "Sort column (e.g., published_at, title, created_at)"
          in: query
          name: sort
          required: false
          type: string
          default: "published_at"
        - description: "Sort direction (asc, desc)"
          in: query
          name: direction
          required: false
          type: string
          default: "desc"
        - description: "Filter by featured status (true/false)"
          in: query
          name: is_featured
          required: false
          type: boolean
      responses:
        "200":
          description: "Success retrieve articles summary list"
          schema:
            properties:
              data:
                type: array
                items:
                  $ref: "#/definitions/ArticleSummary"
              meta:
                $ref: "#/definitions/PaginationMeta"
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Articles summary retrieved successfully"
            type: object
        "500":
          description: "Server error"
      description: Get all public articles summary list (without content)
      operationId: getPublicArticlesSummary
      summary: Get all public articles summary list
      tags:
        - Public Articles
  /api/v1/articles/popular:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: "Page number (Optional, default: 1)"
