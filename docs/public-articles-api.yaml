          name: page
          required: false
          type: integer
          default: 1
        - description: "Total items per page / limit (Optional, default: 9)"
          in: query
          name: limit
          required: false
          type: integer
      responses:
        "200":
          description: "Success retrieve popular articles"
          schema:
            properties:
              data:
                type: array
                items:
                  $ref: "#/definitions/Article"
              meta:
