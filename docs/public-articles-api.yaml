        "500":
          description: "Server error"
      description: Get public articles by author username
      operationId: getPublicArticlesByAuthor
      summary: Get public articles by author username
      tags:
        - Public Articles
  /api/v1/articles/archive/{year}:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: "Archive year (e.g., 2026)"
          in: path
          name: year
          required: true
          type: integer
        - description: "Page number (Optional, default: 1)"
          in: query
          name: page
          required: false
          type: integer
          default: 1
        - description: "Total items per page / limit (Optional, default: 9)"
          in: query
          name: limit
          required: false
          type: integer
        - description: "Search keyword"
          in: query
          name: search
          required: false
          type: string
        - description: "Sort column (e.g., published_at, title, created_at)"
          in: query
          name: sort
          required: false
          type: string
          default: "published_at"
        - description: "Sort direction (asc, desc)"
          in: query
          name: direction
          required: false
          type: string
          default: "desc"
      responses:
        "200":
          description: "Success retrieve archive articles by year"
          schema:
            properties:
              data:
