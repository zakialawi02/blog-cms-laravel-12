              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Archive articles by year retrieved successfully"
            type: object
        "400":
          description: "Bad Request: Invalid year format or missing path variable"
        "500":
          description: "Server error"
      description: Get public articles by archive year
      operationId: getPublicArticlesByYear
      summary: Get public articles by archive year
      tags:
        - Public Articles
  /api/v1/articles/archive/{year}/{month}:
    get:
      consumes:
