              message:
                type: string
                example: "Tag articles retrieved successfully"
            type: object
        "400":
          description: "Bad Request: Path variable missing or empty"
        "500":
          description: "Server error"
      description: Get public articles by tag slug
      operationId: getPublicArticlesByTag
      summary: Get public articles by tag slug
      tags:
        - Public Articles
  /api/v1/articles/user/{username}:
    get:
      consumes:
        - application/json
      produces:
