      parameters:
        - description: "Category slug"
          in: path
          name: slug
          required: true
          type: string
        - description: "Page number (Optional, default: 1)"
          in: query
          name: page
          required: false
          type: integer
          default: 1
        - description: "Total items per page / limit (Optional, default: 9)"
          in: query
          name: limit
          required: false
          type: integer
        - description: "Search keyword"
          in: query
          name: search
          required: false
          type: string
        - description: "Sort column (e.g., published_at, title, created_at)"
          in: query
          name: sort
          required: false
          type: string
          default: "published_at"
        - description: "Sort direction (asc, desc)"
          in: query
          name: direction
          required: false
          type: string
          default: "desc"
      responses:
        "200":
          description: "Success retrieve category articles"
          schema:
            properties:
              data:
                type: array
                items:
                  $ref: "#/definitions/Article"
              meta:
                $ref: "#/definitions/PaginationMeta"
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Category articles retrieved successfully"
            type: object
        "400":
          description: "Bad Request: Path variable missing or empty"
        "500":
          description: "Server error"
      description: Get public articles by category slug
      operationId: getPublicArticlesByCategory
      summary: Get public articles by category slug
      tags:
        - Public Articles
  /api/v1/articles/tag/{slug}:
    get:
      consumes:
